<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Threads 데이터 삭제</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { display: grid; min-height: 100vh; margin: 0; place-items: center; background: #f4f4f0; color: #171717; }
    main { width: min(36rem, calc(100% - 3rem)); padding: 2rem; border: 1px solid #d8d8d2; border-radius: 1.25rem; background: #fff; }
    h1 { margin-top: 0; letter-spacing: -0.04em; }
    p { line-height: 1.65; }
    @media (prefers-color-scheme: dark) { body { background: #111; color: #f5f5f5; } main { border-color: #333; background: #1c1c1c; } }
  </style>
</head>
<body>
  <main>
    <h1>Threads 데이터 삭제 콜백</h1>
    <p>Threads 앱의 데이터 삭제 요청을 수신하는 주소입니다.</p>
  </main>
</body>
</html>
